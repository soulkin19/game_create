<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単HTMLゲームメーカー V2</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background-color: #1e1e1e; color: #fff; }
        
        /* スタートアップモーダル（初期画面） */
        #startup-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 400px;
        }
        .modal-content button {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background-color: #4CAF50; color: white; border: none; border-radius: 5px;
            font-size: 1.1rem; cursor: pointer;
        }
        .modal-content button.blank { background-color: #555; }
        .modal-content button:hover { opacity: 0.9; }

        /* レイアウト */
        #sidebar { width: 300px; background-color: #2d2d2d; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #main { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #555; padding-bottom: 10px; }
        
        /* ツールボタン */
        .tool-btn {
            display: block; width: 100%; padding: 10px; margin-bottom: 10px;
            background-color: #008CBA; color: white; border: none; border-radius: 5px; cursor: pointer;
        }
        .tool-btn:hover { background-color: #007B9E; }
        
        /* コードエリア */
        #code-area { flex-grow: 1; display: flex; flex-direction: column; }
        textarea {
            flex-grow: 1; background-color: #1e1e1e; color: #d4d4d4;
            border: 1px solid #555; padding: 15px; font-family: monospace;
            font-size: 14px; resize: none; line-height: 1.5; outline: none;
        }
        textarea:focus { border-color: #4CAF50; }
    </style>
</head>
<body>

    <div id="startup-modal">
        <div class="modal-content">
            <h2>プロジェクトを新規作成</h2>
            <p>開始方法を選んでください</p>
            <button class="blank" onclick="startProject('blank')">1からつくる (空のHTML)</button>
            <button onclick="startProject('preset_2d')">プリセット: 2D基本セット</button>
            <button onclick="startProject('preset_action')">プリセット: WASD＋iPad操作アクション</button>
        </div>
    </div>

    <div id="sidebar">
        <h2>機能を追加 (JS用)</h2>
        <button class="tool-btn" onclick="addCode('shoot')">🔫 弾を撃つ処理を追加</button>
        <button class="tool-btn" onclick="addCode('enemy')">👾 敵をランダム出現</button>
    </div>

    <div id="main">
        <h2>コードエディタ (自由に編集可能)</h2>
        <div id="code-area">
            <textarea id="outputCode"></textarea>
        </div>
    </div>

    <script>
        const outputCode = document.getElementById('outputCode');
        const modal = document.getElementById('startup-modal');

        // 雛形のテンプレート (プレースホルダー /* __INSERT_CODE_HERE__ */ を用意)
        const htmlBoilerplate = `<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; }
        canvas { display: block; margin: 0 auto; background: #fff; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        /* __INSERT_CODE_HERE__ */

    <\/script>
</body>
</html>`;

        // プリセット用コード
        const presets = {
            blank: htmlBoilerplate,
            preset_2d: htmlBoilerplate.replace('/* __INSERT_CODE_HERE__ */', `
        // --- 2D基本ループ ---
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            ctx.fillText('ゲーム画面', 50, 50);
            requestAnimationFrame(loop);
        }
        loop();
        /* __INSERT_CODE_HERE__ */`),
            preset_action: htmlBoilerplate.replace('/* __INSERT_CODE_HERE__ */', `
        // --- プレイヤー (WASD & タッチ対応) ---
        let player = { x: 400, y: 300, speed: 5, size: 20 };
        let keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // タッチ操作（iPad等用）
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        canvas.addEventListener('touchmove', e => {
            player.x += (e.touches[0].clientX - touchStartX) * 0.1;
            player.y += (e.touches[0].clientY - touchStartY) * 0.1;
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
        });

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (keys['w']) player.y -= player.speed;
            if (keys['s']) player.y += player.speed;
            if (keys['a']) player.x -= player.speed;
            if (keys['d']) player.x += player.speed;

            ctx.fillStyle = 'blue';
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            requestAnimationFrame(loop);
        }
        loop();
        /* __INSERT_CODE_HERE__ */`)
        };

        // 追加機能用パーツ
        const codeParts = {
            shoot: `
        // --- 弾の発射処理 ---
        let bullets = [];
        window.addEventListener('mousedown', () => {
            bullets.push({ x: player.x, y: player.y, speed: 10 });
        });
        // ※loop()の中に弾の描画処理を自分で書き足してね！\n`,
            enemy: `
        // --- 敵の出現処理 ---
        let enemies = [];
        setInterval(() => {
            enemies.push({ x: Math.random() * canvas.width, y: 0, speed: 2 });
        }, 1000);
        // ※loop()の中に敵の移動・描画処理を自分で書き足してね！\n`
        };

        // プロジェクト開始処理
        function startProject(type) {
            outputCode.value = presets[type];
            modal.style.display = 'none'; // モーダルを隠す
        }

        // コード追加機能（プレースホルダーの位置に挿入）
        function addCode(partId) {
            let currentCode = outputCode.value;
            let injectionPoint = '/* __INSERT_CODE_HERE__ */';
            
            if (currentCode.includes(injectionPoint)) {
                // プレースホルダーの前にコードを挿入し、プレースホルダーは残す
                outputCode.value = currentCode.replace(injectionPoint, codeParts[partId] + "\n        " + injectionPoint);
            } else {
                // もしユーザーがプレースホルダーを消してしまっていたら一番下に追記
                outputCode.value += "\n" + codeParts[partId];
            }
            
            // テキストエリアにフォーカスして少しスクロール
            outputCode.focus();
        }
    </script>
</body>
</html>
